dependencies:
  flutter:
    sdk: flutter

  # Core Utilities
  shared_preferences: ^2.3.5
  device_info_plus: ^11.3.0
  flutter_compass: ^0.8.1
  vibration: ^3.1.5
  geocoding: ^2.2.0
  hijri: ^3.0.0
  table_calendar: ^3.1.2

  # 🌍 Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # 🔔 Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

  # 🌐 Network
  http: ^1.1.0

  # 📍 Location & Maps
  geolocator: ^9.0.2
  google_maps_flutter: ^2.4.0
  flutter_polyline_points: ^3.1.0

  # 🍎 iOS icons & UI
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 🎨 App icons & splash
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

# 🎯 App launcher icons
flutter_icons:
  android: true
  ios: true
  image_path: assets/splash_logo.png

# 💦 Splash screen
# 💦 Splash screen
flutter_native_splash:
  color: "#1ABC9C"
  image: assets/splash_logo.png
  android: true
  ios: true

  android_12:
    color: "#1ABC9C"
    image: assets/splash_logo.png
    # Adding this helps force Android to use the new file
    icon_backgroundColor: "#1ABC9C"